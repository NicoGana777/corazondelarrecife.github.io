<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-label="Mero gigante" fill="none" stroke="url(#animalStroke)" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
  <title>Mero gigante</title>
  <defs>
    <linearGradient id="animalStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8f6ff" stop-opacity="0.95"/>
      <stop offset="48%" stop-color="#7fb8d4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="aquaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="soft"/>
      <feColorMatrix in="soft" type="matrix" values="0 0 0 0 0.45  0 0 0 0 0.75  0 0 0 0 0.9  0 0 0 0.65 0" result="glow"/>
      <feMerge>

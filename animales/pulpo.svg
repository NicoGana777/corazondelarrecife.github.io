    <path d="M52 66 Q28 83 27 106 Q42 110 43 91 M64 72 Q54 89 57 110 M76 74 Q70 94 77 112 M88 74 Q95 94 88 112 M100 72 Q111 89 103 110 M108 66 Q132 83 133 106 Q118 110 117 91"/>

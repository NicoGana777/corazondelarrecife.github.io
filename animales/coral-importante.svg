    <path d="M80 108 V54 M80 70 Q61 62 56 39 M56 39 Q45 36 42 25 M56 39 Q66 31 65 18 M80 63 Q101 56 106 34 M106 34 Q119 31 126 19 M106 34 Q96 25 99 13 M80 85 Q63 86 48 72 M80 88 Q100 86 118 72"/>

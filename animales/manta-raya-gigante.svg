<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-label="Manta raya gigante" fill="none" stroke="url(#animalStroke)" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round">
  <title>Manta raya gigante</title>
  <defs>
    <linearGradient id="animalStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8f6ff" stop-opacity="0.95"/>
      <stop offset="48%" stop-color="#7fb8d4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="aquaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="soft"/>
      <feColorMatrix in="soft" type="matrix" values="0 0 0 0 0.45  0 0 0 0 0.75  0 0 0 0 0.9  0 0 0 0.65 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style><![CDATA[
      svg { overflow: visible; }
      g { filter: url(#aquaGlow); }
      path, ellipse, rect, line, circle { vector-effect: non-scaling-stroke; }
      path, ellipse, rect, line { stroke: url(#animalStroke); }
      circle:not([fill="none"]) { stroke: none; }
      path[opacity], ellipse[opacity], line[opacity] { opacity: 0.62; }
    ]]></style>
  </defs>
  <g opacity="0.98">
    <path d="M80 28 Q68 18 55 28 Q33 35 12 58 Q6 70 16 76 Q35 82 62 68 Q74 62 80 60 Q86 62 98 68 Q125 82 144 76 Q154 70 148 58 Q127 35 105 28 Q92 18 80 28 Z"/>
    <path d="M80 60 L80 112" opacity="0.7"/>
    <circle cx="70" cy="39" r="1.8" fill="#f5f1ea" stroke="none"/><circle cx="90" cy="39" r="1.8" fill="#f5f1ea" stroke="none"/>
  </g>
</svg>
